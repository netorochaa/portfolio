<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>José Neto — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="assets/favicon_192.png" />
</head>
<body>

  <!-- ═══════════════════════════ LOADING SCREEN ═══════════════════════════ -->
  <div id="loading-screen">
    <div class="boot-terminal">
      <div class="boot-line" id="boot-cmd"></div>
      <div class="boot-output" id="boot-output"></div>
    </div>
  </div>

  <!-- ═══════════════════════════ MAIN APP ═══════════════════════════════ -->
  <div id="app" class="app-hidden">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="terminal-dots">
          <span class="tdot tdot-red"></span>
          <span class="tdot tdot-yellow"></span>
          <span class="tdot tdot-green"></span>
        </div>
        <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle Sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
          </svg>
        </button>
      </div>


      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Conversas</div>
        <ul class="conv-list" id="conv-list">
          <li class="conv-item active" data-conv="about">
            <svg class="conv-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
            <span>Quem é José Neto?</span>
          </li>
          <li class="conv-item" data-conv="skills">
            <svg class="conv-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
            <span>Stack &amp; Tecnologias</span>
          </li>
          <li class="conv-item" data-conv="experience">
            <svg class="conv-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
            <span>Experiência Profissional</span>
          </li>
          <li class="conv-item" data-conv="projects">
            <svg class="conv-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
            <span>Projetos em Destaque</span>
          </li>
          <li class="conv-item" data-conv="education">
            <svg class="conv-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
            <span>Formação &amp; Certificações</span>
          </li>
          <li class="conv-item" data-conv="contact">
            <svg class="conv-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
            <span>Contato</span>
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div class="sidebar-user-info">
            <span class="sidebar-user-name" id="sidebar-guest-label">convidado</span>
            <span class="sidebar-user-role" id="sidebar-guest-role">guest session</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- SIDEBAR OVERLAY (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- SIDEBAR REOPEN BUTTON -->
    <button class="sidebar-reopen" id="sidebar-reopen" title="Abrir Sidebar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
    </button>

    <!-- MAIN CONTENT -->
    <main class="main">

      <!-- Terminal Window Chrome -->
      <div class="terminal-chrome">
        <div class="terminal-title" id="terminal-title">portfolio</div>

        <div class="lang-toggle" id="lang-toggle">
          <button class="lang-btn active" data-lang="pt">PT</button>
          <span class="lang-sep">·</span>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </div>

      <!-- Chat Messages -->
      <div class="chat-area" id="chat-area"></div>

      <!-- Input Bar -->
      <div class="input-bar">
        <div class="input-inner">
          <span class="prompt-char">❯</span>
          <div class="fake-input" id="fake-input">
            <span class="fake-input-text"></span>
            <span class="fake-cursor blink"></span>
          </div>
        </div>
        <div class="input-meta">
          <span><kbd>↑↓</kbd> navegar</span>
          <span><kbd>⏎</kbd> enviar</span>
          <span><kbd>shift+⏎</kbd> nova linha</span>
        </div>
      </div>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
